<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Beckwards — Official Site</title>
  <meta name="description" content="Beckwards — new music, links, and experiments." />
  <meta property="og:title" content="Beckwards" />
  <meta property="og:description" content="New music from Beckwards." />
  <meta property="og:image" content="assets/og-image.jpg" />
  <meta property="og:url" content="https://beckwards.com" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- canonical (nice for SEO + avoids /index.html duplicates) -->
  <link rel="canonical" href="https://www.beckwards.com/" />

  <!-- favicon / tab thumbnail -->
  <link rel="icon" type="image/png" href="assets/1.png" />

  <link rel="stylesheet" href="style.css" />

  <script>
    // --- Clean URL helper (runs ASAP) ---
    // If someone hits /index.html, send them to /
    (function () {
      var p = location.pathname;
      if (/\/index\.html$/i.test(p)) {
        var root = location.origin + "/";
        var tail = location.search + location.hash;
        location.replace(root + tail);
      }
    })();
  </script>
</head>
<body>
  <div class="wrap">

    <!-- top title + subtitle -->
    <header class="top">
      <h1>BECKWARDS</h1>
      <p class="subtitle">Claw Machine</p>
    </header>

    <!-- two-column stage: left links, center video -->
    <main class="stage">
      <aside class="left-links" aria-label="site pages">
        <ul>
          <!-- Removed Home link (URL still handled by redirect + canonical) -->
          <li><a href="music.html">Music</a></li>
          <li><a href="lyrics.html">Lyrics</a></li>
          <li><a href="store.html">Store</a></li>
          <li><a href="live.html">Live</a></li>
          <li><a href="digital.html">Digital Madness</a></li>
        </ul>
      </aside>

      <section class="center-visual" aria-label="hero video">
        <div class="hero-frame">
          <video class="hero-video"
                 autoplay loop muted playsinline
                 preload="auto"
                 poster="assets/og-image.jpg">
            <source src="assets/lil.mp4" type="video/mp4" />
            Sorry—your browser doesn’t support embedded video. <a href="assets/lil.mp4">Watch the mp4</a>.
          </video>
        </div>
      </section>
    </main>

    <!-- bottom row: simple social links -->
    <nav class="bottom-links" aria-label="social">
      <a href="https://open.spotify.com/artist/0urHGaFXBdSbrykH82Ferf" target="_blank" rel="noopener">spotify</a>
      <span>•</span>
      <a href="https://music.apple.com/us/album/the-call/1837441446?i=1837441447" target="_blank" rel="noopener">apple</a>
      <span>•</span>
      <a href="https://www.instagram.com/beckwardss/" target="_blank" rel="noopener">instagram</a>
    </nav>

    <footer class="foot">
      <p><strong>Under heavy tinkering</strong></p>
      <p class="tiny">© <span id="year"></span> Beckwards</p>
    </footer>
  </div>

  <script>
    // Set year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Seamless loop fix: jump back just before the last frame to avoid a black flash
    const v = document.querySelector('.hero-video');
    const EPS = 0.08; // seconds to skip before the end (tweak if needed)

    // best-effort autoplay (mobile may block)
    v?.play?.().catch(() => {});

    v?.addEventListener('timeupdate', () => {
      if (!v.duration) return;
      if (v.duration - v.currentTime < EPS) {
        v.currentTime = 0.001; // start-of-clip nudge
      }
    });

    v?.addEventListener('ended', () => {
      v.currentTime = 0.001;
      v.play().catch(() => {});
    });
  </script>
</body>
</html>
